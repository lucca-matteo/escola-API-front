<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Sistema Escolar</h1>
  <p>Gerenciamento de Alunos</p>
</header>

<div class="container">

  <button class="btn primary" onclick="abrirModal()">+ Novo Aluno</button>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>RA</th>
          <th>Nome</th>
          <th>Email</th>
          <th>Data</th>
          <th>Turma</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>Novo Aluno</h2>

    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">
    <input id="data" type="date">
    <input id="turma" placeholder="Turma">

    <div class="actions">
      <button class="btn primary" onclick="salvar()">Salvar</button>
      <button class="btn danger" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
